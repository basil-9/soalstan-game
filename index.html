<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إقليم - سؤالستان 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --main: #a855f7; --gold: #facc15; --red: #ef4444; --green: #22c55e; }
        body { margin: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; overflow-x: hidden; min-height: 100vh; }
        .bg-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle, #1e1b4b 0%, #020617 100%); }
        
        .card { background: rgba(15, 23, 42, 0.95); border: 3px solid var(--main); border-radius: 30px; width: 92vw; max-width: 500px; min-height: 80vh; padding: 20px; position: relative; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 30px rgba(168, 85, 247, 0.2); margin: 15px 0; }
        
        #timer-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.1); display: none; z-index: 1000; }
        #timer-bar { height: 100%; width: 100%; background: var(--main); transition: 1s linear; }

        .btn-game { background: none; border: 2px solid var(--gold); color: var(--gold); padding: 10px 20px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 10px; }
        .btn-game:hover { background: var(--gold); color: black; }
        
        .input-box { background: rgba(255,255,255,0.05); border: 1px solid var(--main); color: white; padding: 10px; border-radius: 12px; text-align: center; font-size: 16px; width: 100%; margin: 5px 0; box-sizing: border-box; }
        .select-box { background: #1e1b4b; border: 2px solid var(--main); color: white; padding: 10px; border-radius: 12px; text-align: center; font-size: 16px; width: 100%; margin: 5px 0; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; }
        .select-box option { background-color: #0b0e14; color: white; }

        .how-to-play { margin-top: 25px; padding: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 15px; border: 1px solid rgba(168, 85, 247, 0.3); width: 90%; text-align: right; }
        .how-to-play ul { padding-right: 20px; margin: 5px 0; }
        .how-to-play li { font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 5px; }

        #result-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; padding: 25px; border-radius: 20px; display: none; text-align: center; z-index: 200; backdrop-filter: blur(15px); border: 4px solid; background: rgba(0,0,0,0.95); box-sizing: border-box; }
        .q-image { max-width: 100%; max-height: 250px; border-radius: 15px; margin-top: 10px; border: 2px solid var(--main); object-fit: contain; }

        .top-info-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 15px; width: 100%; position: relative; margin-bottom: 10px; box-sizing: border-box; }
        #real-time-clock { position: absolute; left: 50%; transform: translateX(-50%); color: var(--gold); font-weight: bold; font-size: 14px; border: 1px solid rgba(250, 204, 21, 0.3); padding: 2px 8px; border-radius: 8px; white-space: nowrap; }
        
        #players-scores { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; width: 100%; font-size: 14px; margin-top: 5px; }
        .score-pill { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }

        .avatar-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; max-height: 100px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; border: 1px solid rgba(168, 85, 247, 0.4); }
        .avatar-item { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background: rgba(255,255,255,0.05); }
        .avatar-item:hover { transform: scale(1.1); }
        .avatar-item.selected { border-color: var(--gold); transform: scale(1.1); box-shadow: 0 0 10px var(--gold); background: rgba(250, 204, 21, 0.2); }
        
        .cat-wrapper { margin-top: 15px; width: 100%; max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid var(--main); box-sizing: border-box; }
        .cat-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .cat-btn { background: #1d4ed8; color: white; border: 2px solid #1e3a8a; border-radius: 8px; padding: 8px 15px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .cat-btn:hover { transform: scale(1.05); }
        .cat-btn.selected { background: var(--main); border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .cat-btn::before { content: '✨'; font-size: 12px; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--main); border-radius: 10px; }

        .podium-container { display: flex; align-items: flex-end; justify-content: center; gap: 15px; margin-top: 30px; margin-bottom: 20px; }
        .podium-rank { display: flex; flex-direction: column; align-items: center; }
        .podium-1 { transform: scale(1.25); z-index: 10; margin: 0 15px; position: relative; }
        .podium-avatar { border-radius: 50%; border: 3px solid; background: rgba(0,0,0,0.5); box-shadow: 0 0 15px; object-fit: cover; }
        .podium-1 .podium-avatar { border-color: #fbbf24; box-shadow: 0 0 25px #fbbf24; width: 85px; height: 85px; }
        .podium-2 .podium-avatar { border-color: #cbd5e1; box-shadow: 0 0 15px #cbd5e1; width: 65px; height: 65px; }
        .podium-3 .podium-avatar { border-color: #b45309; box-shadow: 0 0 15px #b45309; width: 60px; height: 60px; }
        .podium-name { font-weight: bold; margin-top: 8px; font-size: 13px; text-align: center; max-width: 90px; word-wrap: break-word; }
        .podium-score { color: var(--gold); font-size: 11px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
        .crown { font-size: 35px; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); animation: floatCrown 1.5s infinite alternate ease-in-out; text-shadow: 0 0 10px #fbbf24; }
        @keyframes floatCrown { from { top: -25px; } to { top: -35px; } }
        
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 9999; animation: fall linear forwards; opacity: 0.8; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>

<div class="bg-stars"></div>
<div id="timer-container"><div id="timer-bar"></div></div>

<button id="exit-btn" style="position:absolute; top:15px; left:15px; z-index:1001; background:none; color:white; border:1px solid white; padding:5px 12px; border-radius:10px; cursor:pointer; font-size: 12px; display:none;" onclick="exitGame()">⬅ خروج</button>

<div id="join-screen" class="card">
    <h1 style="font-size: 45px; color: var(--main); text-shadow: 0 0 15px var(--main); margin: 10px 0;">سؤالستان</h1>
    
    <div style="width: 100%; max-width: 320px;">
        <input type="text" id="player-name" class="input-box" placeholder="اكتب اسمك">
        <div style="display: flex; gap: 5px;">
            <input type="text" id="room-id" class="input-box" placeholder="كود الغرفة">
            <button class="btn-game" style="width: 50px; margin-top: 5px; padding: 5px;" onclick="generateCode()">🎲</button>
        </div>
        
        <div style="margin-top: 15px; width: 100%;">
            <label style="font-size:13px; color: var(--gold); font-weight: bold;">اختر شخصيتك 🎭</label>
            <div id="avatar-selection" class="avatar-grid"></div>
        </div>

        <div style="margin-top: 15px; width: 100%;">
            <label style="font-size:13px; color: var(--gold); font-weight: bold;">اختر التصنيفات (للقائد فقط) 📚</label>
            <div class="cat-wrapper">
                <div id="categories-grid" class="cat-grid">
                    <span style="font-size:12px; color:#9ca3af;">جاري تحميل التصنيفات...</span>
                </div>
            </div>
            <div style="font-size:10px; color:#9ca3af; text-align:center; margin-top:5px;">(إذا لم تختر شيء، ستلعب بجميع الأسئلة)</div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <div>
                <label style="font-size:11px; color: var(--gold);">وقت الجولة</label>
                <select id="set-time" class="select-box">
                    <option value="15">15 ثانية</option>
                    <option value="20">20 ثانية</option>
                    <option value="25">25 ثانية</option>
                    <option value="30" selected>30 ثانية</option>
                    <option value="35">35 ثانية</option>
                    <option value="40">40 ثانية</option>
                    <option value="45">45 ثانية</option>
                    <option value="60">60 ثانية</option>
                </select>
            </div>
            <div>
                <label style="font-size:11px; color: var(--gold);">عدد الجولات</label>
                <select id="set-rounds" class="select-box">
                    <option value="5">5 جولات</option>
                    <option value="10" selected>10 جولات</option>
                    <option value="20">20 جولة</option>
                </select>
            </div>
        </div>

        <button class="btn-game" style="background:var(--main); color:white; border:none; margin-top: 20px;" onclick="joinGame()">دخول اللعبة 🚀</button>
    </div>
</div>

<div id="game-screen" style="display: none; width: 100vw; justify-content: center;">
    <div class="card">
        <div id="result-overlay" class="animate__animated">
            <h1 id="result-status" style="font-size:35px;"></h1>
            <p id="result-detail" style="font-size:18px;"></p>
        </div>

        <div class="top-info-bar">
            <div id="round-counter" style="color: var(--gold); font-weight: bold; font-size: 13px;">جولة: <span id="current-round">1</span>/<span id="total-rounds">10</span></div>
            <div id="real-time-clock">00:00:00</div>
            <div onclick="copyRoomCode()" style="font-size: 12px; cursor: pointer; border:1px solid rgba(255,255,255,0.2); padding: 2px 5px; border-radius: 5px;"><span id="display-room-id">---</span> 📋</div>
        </div>
        
        <div id="players-scores"></div>

        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin: 10px 0;">
            <div id="leader-tag" style="display:none; color: var(--gold); font-weight: bold; font-size: 12px;">👑 أنت القائد</div>
        </div>

        <div id="win-screen" class="animate__animated zoomIn" style="display:none; text-align:center; width: 100%; max-height: 85vh; overflow-y: auto;">
            <div id="winner-text" style="color: white; margin: 10px 0;"></div>
            
            <button id="restart-btn" class="btn-game animate__animated animate__pulse animate__infinite" style="background:var(--main); color:white; border:none; margin-top:20px; display:none;" onclick="socket.emit('restartGame')">إعادة اللعب بنفس الغرفة 🔄</button>
            <h3 id="wait-restart-text" style="color:var(--gold); margin-top:20px; display:none; font-size:16px;">بانتظار القائد لإعادة اللعبة... ⏳</h3>
            
            <button class="btn-game" style="border-color:var(--red); color:var(--red); margin-top:10px; font-size: 14px; padding: 5px; margin-bottom: 20px;" onclick="exitGame()">خروج من الغرفة 🚪</button>
        </div>
        
        <div id="lobby-area" style="text-align: center; width: 100%; margin-top: 5px;">
            <h2 style="font-size: 18px; color: var(--main); margin-bottom: 10px;">اللاعبين المتصلين:</h2>
            <div id="players-list" style="margin-bottom: 20px; padding: 15px; border: 1px dashed var(--main); border-radius: 15px; min-height: 100px;">بانتظار انضمام اللاعبين...</div>
            
            <h2 id="hint-text" style="font-size: 22px; padding: 10px;">بانتظار القائد لبدء اللعبة...</h2>
            
            <div id="leader-controls" style="display:none; margin-top: 10px; gap: 5px; justify-content: center;">
                <button id="start-btn" class="btn-game" style="width: 100%; border-color: var(--green); color: var(--green);" onclick="socket.emit('requestGameStart')">بدء اللعبة 🚀</button>
            </div>
        </div>

        <div id="question-area" style="display: none; text-align: center; width: 100%;">
            <div id="decisive-alert" style="display:none; margin-bottom: 10px;">
                <div class="animate__animated animate__flash animate__infinite" style="background:var(--red); color:white; padding:5px 15px; border-radius:12px; font-weight:bold; display:inline-block; font-size: 14px;">🔥 الجولة الحاسمة: النقاط مضاعفة! 🔥</div>
            </div>

            <div id="q-content"></div>
            <div id="bluff-area" style="display: none; margin-top: 15px; width: 100%;">
                <input type="text" id="my-bluff" class="input-box" placeholder="اكتب إجابة مضللة لخدعهم...">
                <button class="btn-game" onclick="submitMyBluff()">أرسل الخدعة 🕵️‍♂️</button>
            </div>
            <div id="options" style="display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; width: 100%; display: none;"></div>
            
            <div id="status-text" style="margin-top: 15px; color: var(--gold); font-size: 14px;"></div>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const sounds = { 
        correct: new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3'), 
        wrong: new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'), 
        click: new Audio('https://www.soundjay.com/buttons/button-16.mp3') 
    };
    function playSnd(s) { sounds[s].play().catch(()=>{}); }

    const socket = io();
    let myInfo = {}, isLeader = false, timerInt, roomSettings = {};
    let allPlayers = {}, myBluffText = "", currentCorrectAnswer = "";
    let selectedAvatarUrl = ""; 
    let selectedCategories = []; 

    function normalizeArabic(text) {
        if (!text) return "";
        return text.replace(/[أإآ]/g, 'ا')
                   .replace(/ة/g, 'ه')
                   .replace(/[ىي]/g, 'ي')
                   .replace(/[\u064B-\u065F]/g, '')
                   .trim();
    }

    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            let cats = new Set();
            data.forEach(q => {
                let c = q.category || q.hint || q.type;
                if(c && c !== 'text' && c !== 'image') cats.add(c);
            });
            let catArray = Array.from(cats);
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = '';
            
            if(catArray.length > 0) {
                catArray.forEach(cat => {
                    let btn = document.createElement('div');
                    btn.className = 'cat-btn';
                    btn.innerText = cat;
                    btn.onclick = () => {
                        playSnd('click');
                        btn.classList.toggle('selected');
                        if(selectedCategories.includes(cat)) {
                            selectedCategories = selectedCategories.filter(c => c !== cat);
                        } else {
                            selectedCategories.push(cat);
                        }
                    };
                    grid.appendChild(btn);
                });
            } else {
                grid.innerHTML = '<span style="font-size:12px; color:#9ca3af;">لا توجد تصنيفات محددة في ملف الأسئلة</span>';
            }
        })
        .catch(e => {
            document.getElementById('categories-grid').innerHTML = '<span style="font-size:12px; color:#ef4444;">خطأ في تحميل التصنيفات</span>';
        });

    function generateAvatars() {
        const styles = ['bottts', 'adventurer', 'fun-emoji', 'micah'];
        const seeds = ['Oliver', 'Mimi', 'Loki', 'Garfield', 'Abby', 'Tinkerbell', 'Coco', 'Socks', 'Simba', 'Leo', 'Milo', 'Cleo', 'Jack', 'Luna', 'Bella', 'Max', 'Rocky', 'Zoe', 'Sam', 'Mia'];
        const avatarBox = document.getElementById('avatar-selection');
        
        seeds.forEach((seed, index) => {
            let randomStyle = styles[Math.floor(Math.random() * styles.length)];
            let url = `https://api.dicebear.com/7.x/${randomStyle}/svg?seed=${seed}&backgroundColor=1e1b4b`;
            
            let img = document.createElement('img');
            img.src = url;
            img.className = 'avatar-item';
            
            if(index === 0) {
                img.classList.add('selected');
                selectedAvatarUrl = url;
            }

            img.onclick = () => {
                playSnd('click');
                document.querySelectorAll('.avatar-item').forEach(el => el.classList.remove('selected'));
                img.classList.add('selected');
                selectedAvatarUrl = url;
            };
            avatarBox.appendChild(img);
        });
    }
    generateAvatars();

    function updateClock() {
        const now = new Date();
        const clockElement = document.getElementById('real-time-clock');
        if(clockElement) clockElement.innerText = now.toLocaleTimeString('ar-SA', { hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();

    function generateCode() { 
        playSnd('click'); document.getElementById('room-id').value = "GAME-" + Math.floor(1000 + Math.random() * 9000); 
    }
    function copyRoomCode() { navigator.clipboard.writeText(myInfo.room); alert("تم نسخ الكود!"); }

    function joinGame() {
        playSnd('click');
        const n = document.getElementById('player-name').value;
        const r = document.getElementById('room-id').value.trim().toUpperCase();
        const mt = parseInt(document.getElementById('set-time').value);
        const mr = parseInt(document.getElementById('set-rounds').value);

        if(!n || !r) return alert("الرجاء كتابة الاسم وكود الغرفة!");
        
        myInfo = { name: n, room: r, avatar: selectedAvatarUrl };
        document.getElementById('display-room-id').innerText = r;
        document.getElementById('total-rounds').innerText = mr; 
        
        document.getElementById('join-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('exit-btn').style.display = 'block'; 
        
        socket.emit('joinRoom', { 
            roomID: r, 
            name: n, 
            avatar: selectedAvatarUrl, 
            settings: { roundTime: mt, maxRounds: mr, categories: selectedCategories } 
        });
    }

    function exitGame() {
        playSnd('click'); socket.emit('leaveRoom'); location.reload();
    }

    socket.on('updateState', d => {
        allPlayers = d.players;
        isLeader = (d.leader === socket.id);
        if (d.settings) roomSettings = d.settings;
        
        const scoresDiv = document.getElementById('players-scores');
        scoresDiv.innerHTML = '';
        
        const lobbyList = document.getElementById('players-list');
        lobbyList.innerHTML = '';
        let lobbyHtml = '<div style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center;">';

        for(let id in allPlayers) {
            let p = allPlayers[id];
            scoresDiv.innerHTML += `<div class="score-pill" style="${(id === socket.id) ? 'color:var(--gold)' : ''}">${p.name}: <span>${p.points}</span></div>`;
            
            let isLeaderBadge = (d.leader === id) ? '👑' : '';
            lobbyHtml += `
            <div class="animate__animated animate__zoomIn" style="display:flex; flex-direction:column; align-items:center; background:rgba(255,255,255,0.05); padding:10px; border-radius:15px; border:1px solid var(--main); width:80px;">
                <img src="${p.avatar}" style="width:60px; height:60px; border-radius:50%; background:rgba(0,0,0,0.3); margin-bottom:5px;">
                <span style="color:white; font-size:12px; font-weight:bold; text-align:center; word-break:break-word;">${p.name} ${isLeaderBadge}</span>
            </div>`;
        }
        lobbyHtml += '</div>';
        lobbyList.innerHTML = lobbyHtml;

        if (document.getElementById('lobby-area').style.display !== 'none') {
            if (isLeader) { 
                document.getElementById('leader-tag').style.display = 'block'; 
                document.getElementById('leader-controls').style.display = 'flex'; 
                document.getElementById('hint-text').innerText = "أنت القائد! متى ما اكتملتوا اضغط بدء 🚀";
            } else {
                document.getElementById('leader-tag').style.display = 'none'; 
                document.getElementById('leader-controls').style.display = 'none'; 
                document.getElementById('hint-text').innerText = "بانتظار القائد لبدء اللعبة...";
            }
        }
    });

    socket.on('gameRestarted', () => {
        document.getElementById('win-screen').style.display = 'none';
        document.getElementById('lobby-area').style.display = 'block';
        document.getElementById('current-round').innerText = '1';
        
        document.querySelectorAll('.confetti').forEach(e => e.remove());
        
        if (isLeader) { 
            document.getElementById('leader-controls').style.display = 'flex'; 
            document.getElementById('hint-text').innerText = "أنت القائد! متى ما اكتملتوا اضغط بدء 🚀";
        } else {
            document.getElementById('leader-controls').style.display = 'none'; 
            document.getElementById('hint-text').innerText = "بانتظار القائد لبدء اللعبة...";
        }
    });

    socket.on('startBluffPhase', d => {
        currentCorrectAnswer = d.fullQuestion.a; 
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('question-area').style.display = 'block';
        document.getElementById('current-round').innerText = d.roundNumber;
        document.getElementById('status-text').innerHTML = '';
        
        document.getElementById('decisive-alert').style.display = d.isDecisive ? 'block' : 'none';
        
        const content = document.getElementById('q-content'); content.innerHTML = '';
        
        let qType = d.fullQuestion.category || d.fullQuestion.hint || 'سؤال عام';
        if (qType === 'text' || qType === 'image') qType = 'سؤال عام';
        
        content.innerHTML += `<div style="background:var(--main); color:white; padding:4px 12px; border-radius:12px; display:inline-block; font-size:13px; font-weight:bold; margin-bottom:10px;">📌 ${qType}</div>`;
        
        // 🚀 الكود المدرع: يحاول بـ 4 طرق عشان يعرض الصورة!
        const rawImgSrc = d.fullQuestion.image || d.fullQuestion.img || d.fullQuestion.url || d.fullQuestion.picture;
        if (rawImgSrc) {
            let cleanUrl = rawImgSrc.trim();
            let isBase64 = cleanUrl.startsWith('data:image');
            
            // صندوق الانتظار الذكي
            content.innerHTML += `<div id="img-container-${d.roundNumber}" style="position:relative; width:100%; min-height:150px; background:rgba(0,0,0,0.3); border-radius:15px; border:1px dashed var(--main); display:flex; align-items:center; justify-content:center; margin-bottom:10px;">
                <span id="img-loading-${d.roundNumber}" style="color:var(--gold); font-size:12px;" class="animate__animated animate__pulse animate__infinite">جاري سحب الصورة... ⏳</span>
            </div>`;

            let img = new Image();
            img.className = 'q-image';
            img.style.display = 'none';

            // المحركات الأربعة
            let proxies = isBase64 ? [cleanUrl] : [
                cleanUrl, 
                `https://wsrv.nl/?url=${encodeURIComponent(cleanUrl)}`, 
                `https://api.allorigins.win/raw?url=${encodeURIComponent(cleanUrl)}`, 
                `https://corsproxy.io/?${encodeURIComponent(cleanUrl)}`
            ];

            let currentProxyIndex = 0;

            // إذا نجح تحميل الصورة بأي محرك
            img.onload = () => {
                let container = document.getElementById(`img-container-${d.roundNumber}`);
                let loading = document.getElementById(`img-loading-${d.roundNumber}`);
                if(container && loading) {
                    loading.style.display = 'none';
                    container.style.border = 'none';
                    container.style.background = 'transparent';
                    img.style.display = 'inline-block';
                    container.appendChild(img);
                }
            };

            // إذا فشل المحرك الحالي، ينقل للي بعده تلقائياً
            img.onerror = () => {
                currentProxyIndex++;
                if (currentProxyIndex < proxies.length) {
                    img.src = proxies[currentProxyIndex];
                } else {
                    // إذا فشلت كل المحركات (يعني الرابط غلط بالأساس)
                    let loading = document.getElementById(`img-loading-${d.roundNumber}`);
                    if(loading) {
                         loading.className = '';
                         loading.innerHTML = `🚫 عذراً، هذا الرابط تالف أو ليس صورة.<br><span style="font-size:10px; color:white;">تأكد إن الرابط في ملف questions.json ينتهي بـ .png أو .jpg</span>`;
                         loading.style.color = 'var(--red)';
                    }
                }
            };

            // تشغيل المحرك الأول
            img.src = proxies[0];
        }
        
        content.innerHTML += `<h1 style="font-size: 22px; color: var(--main); margin: 5px 0 0 0;">${d.fullQuestion.q}</h1>`;
        
        document.getElementById('bluff-area').style.display = 'block';
        document.getElementById('options').style.display = 'none';
        document.getElementById('my-bluff').value = '';
        document.getElementById('my-bluff').disabled = false;
        
        startTimer('bluff');
    });

    function submitMyBluff() {
        playSnd('click');
        let bluff = document.getElementById('my-bluff').value.trim();
        
        if(!bluff) return alert("اكتب أي إجابة عشان تخدعهم!");
        if(normalizeArabic(bluff) === normalizeArabic(currentCorrectAnswer)) {
            return alert("لقد كتبت الاجابة الصحيحة بالفعل اكتب اجابة اخرى لكي تخدع اصدقائك");
        }

        myBluffText = bluff;
        document.getElementById('bluff-area').style.display = 'none';
        document.getElementById('status-text').innerHTML = '<p class="animate__animated animate__pulse animate__infinite" style="color:var(--gold);">تم الحفظ! بانتظار البقية يكتبون خدعهم...</p>';
        socket.emit('submitBluff', { bluff: bluff });
    }

    socket.on('startVotingPhase', d => {
        clearInterval(timerInt);
        document.getElementById('bluff-area').style.display = 'none';
        document.getElementById('options').style.display = 'grid';
        document.getElementById('status-text').innerHTML = '<p style="color:var(--main);">اختر الإجابة الصحيحة بدون ما تطيح بفخ أصدقائك!</p>';
        
        const opts = document.getElementById('options'); opts.innerHTML = '';
        d.options.forEach(o => {
            const b = document.createElement('button'); b.className = 'btn-game'; b.innerText = o;
            
            if (o === myBluffText) {
                b.disabled = true; b.style.opacity = "0.3"; b.innerText += " (إجابتك)";
            } else {
                b.onclick = () => { 
                    playSnd('click'); 
                    b.style.background = 'white'; b.style.color = 'black';
                    const allBtns = document.querySelectorAll('#options .btn-game');
                    allBtns.forEach(btn => btn.disabled = true);
                    document.getElementById('status-text').innerHTML = '<p class="animate__animated animate__pulse animate__infinite" style="color:var(--gold);">تم التصويت! بانتظار النتيجة...</p>';
                    socket.emit('submitVote', { vote: o }); 
                };
            }
            opts.appendChild(b);
        });
        
        startTimer('vote');
    });

    socket.on('playerActed', d => {
        if(d.id !== socket.id) {
            let actMsg = d.action === 'bluffed' ? "كتب إجابته ✍️" : "صوت 🗳️";
            if(!document.getElementById('status-text').innerHTML.includes(d.id)) {
                 document.getElementById('status-text').innerHTML += `<div id="${d.id}" style="font-size:12px;">${allPlayers[d.id].name} ${actMsg}</div>`;
            }
        }
    });

    socket.on('roundResult', d => {
        clearInterval(timerInt); document.getElementById('timer-container').style.display = 'none';
        
        const ov = document.getElementById('result-overlay');
        ov.className = 'animate__animated zoomIn'; ov.style.display = 'block'; 
        ov.style.borderColor = 'var(--gold)'; ov.style.color = 'var(--gold)';
        
        document.getElementById('result-status').innerText = "نتائج الجولة";
        
        let resHtml = "";
        let myRes = d.results[socket.id];
        
        for(let pid in d.results) {
            let p = d.results[pid];
            let details = p.pointsGained > 0 ? `<span style="color:var(--green)">(+${p.pointsGained})</span>` : "(0)";
            let trickInfo = p.tricked.length > 0 ? `<br><span style="color:var(--red);font-size:12px;">خدع: ${p.tricked.join('، ')}</span>` : "";
            
            let voteText = p.votedFor ? p.votedFor : "لم يصوت";
            let voteChoice = `<br><span style="color:#94a3b8;font-size:12px;">اختار: <span style="color:white;">${voteText}</span></span>`;

            resHtml += `<div style="font-size:14px; margin:5px 0; background:rgba(0,0,0,0.5); padding:5px; border-radius:5px;">
                ${p.name}: ${details} ${voteChoice} ${trickInfo}
            </div>`;
        }

        document.getElementById('result-detail').innerHTML = `
            <div style="margin-bottom:10px;">${resHtml}</div>
            الجواب الحقيقي: <span style="color:var(--green); font-size:22px;">${d.correctAns}</span>
        `;

        if(myRes.pointsGained > 0) playSnd('correct'); else playSnd('wrong');

        setTimeout(() => { 
            ov.style.display = 'none'; 
            document.getElementById('q-content').innerHTML = '<h2 class="animate__animated animate__pulse animate__infinite" style="color:var(--gold); padding: 40px 0;">جاري تحضير الجولة التالية... 🚀</h2>';
            document.getElementById('options').style.display = 'none';
            document.getElementById('decisive-alert').style.display = 'none'; 
            document.getElementById('status-text').innerHTML = '';
        }, 6000); 
    });

    function startTimer(phase) {
        if(timerInt) clearInterval(timerInt);
        document.getElementById('timer-container').style.display = 'block';
        let timeLeft = 100; let step = 100 / (roomSettings.roundTime * 10);
        
        timerInt = setInterval(() => { 
            timeLeft -= step; 
            document.getElementById('timer-bar').style.width = timeLeft + '%'; 
            
            if(timeLeft <= 0) {
                clearInterval(timerInt); 
                document.getElementById('status-text').innerHTML = '<h3 style="color:var(--red);">انتهى الوقت! ⏳</h3>';
                
                if (isLeader) {
                    if (phase === 'bluff') socket.emit('timeoutBluffAll');
                    else if (phase === 'vote') socket.emit('timeoutVoteAll');
                }
            } 
        }, 100);
    }

    function fireConfetti() {
        const colors = ['#facc15', '#a855f7', '#ef4444', '#22c55e', '#3b82f6'];
        for(let i=0; i<80; i++) {
            let conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
            conf.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(conf);
        }
    }

    socket.on('gameOver', d => {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('question-area').style.display = 'none';
        document.getElementById('timer-container').style.display = 'none';
        
        let pArray = Object.values(d.players).sort((a,b) => b.points - a.points);
        
        let html = `<h1 style="font-size: 35px; color: var(--gold); text-shadow: 0 0 20px var(--gold);">🏆 أبطال سؤالستان 🏆</h1>`;
        html += `<div class="podium-container">`;
        
        if(pArray[1]) {
            html += `<div class="podium-rank podium-2 animate__animated animate__fadeInUp" style="animation-delay: 0.5s">
                        <img src="${pArray[1].avatar}" class="podium-avatar">
                        <div class="podium-name" style="color: #cbd5e1;">🥈 ${pArray[1].name}</div>
                        <div class="podium-score">${pArray[1].points} نقطة</div>
                     </div>`;
        }
        
        if(pArray[0]) {
            html += `<div class="podium-rank podium-1 animate__animated animate__zoomIn">
                        <div class="crown">👑</div>
                        <img src="${pArray[0].avatar}" class="podium-avatar">
                        <div class="podium-name" style="color: #fbbf24;">🥇 ${pArray[0].name}</div>
                        <div class="podium-score">${pArray[0].points} نقطة</div>
                     </div>`;
        }
        
        if(pArray[2]) {
            html += `<div class="podium-rank podium-3 animate__animated animate__fadeInUp" style="animation-delay: 1s">
                        <img src="${pArray[2].avatar}" class="podium-avatar">
                        <div class="podium-name" style="color: #d97706;">🥉 ${pArray[2].name}</div>
                        <div class="podium-score">${pArray[2].points} نقطة</div>
                     </div>`;
        }
        html += `</div>`;

        if(pArray.length > 3) {
            html += `<div style="background: rgba(0,0,0,0.5); border: 1px solid var(--main); padding: 10px; border-radius: 15px; margin-top: 15px; max-height: 120px; overflow-y: auto;">`;
            for(let i=3; i<pArray.length; i++) {
                html += `<div style="color: white; font-size:13px; margin-bottom: 8px; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <span>${i+1}.</span> <img src="${pArray[i].avatar}" style="width:25px; height:25px; border-radius:50%; background:rgba(0,0,0,0.3);"> ${pArray[i].name} (${pArray[i].points} نقطة)
                </div>`;
            }
            html += `</div>`;
        }

        if (d.titles.bluffer || d.titles.victim || d.titles.nerd) {
            html += `<div class="animate__animated animate__bounceInUp" style="margin-top:20px; background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; border:1px solid var(--gold); text-align: right;">
                        <h3 style="color:var(--gold); margin-top:0; text-align:center; font-size: 16px;">🎭 ألقاب الشرف والفضايح 🎭</h3>`;
            if (d.titles.bluffer) html += `<div style="margin:8px 0; font-size: 14px;">🦊 <b style="color:var(--gold);">أكبر نصاب:</b> ${d.titles.bluffer}</div>`;
            if (d.titles.victim) html += `<div style="margin:8px 0; font-size: 14px;">🤡 <b style="color:var(--red);">الضحية:</b> ${d.titles.victim}</div>`;
            if (d.titles.nerd) html += `<div style="margin:8px 0; font-size: 14px;">🤓 <b style="color:var(--green);">الدافور:</b> ${d.titles.nerd}</div>`;
            html += `</div>`;
        }
            
        document.getElementById('winner-text').innerHTML = html;
        document.getElementById('win-screen').style.display = 'block';
        
        if(isLeader) {
            document.getElementById('restart-btn').style.display = 'inline-block';
            document.getElementById('wait-restart-text').style.display = 'none';
        } else {
            document.getElementById('restart-btn').style.display = 'none';
            document.getElementById('wait-restart-text').style.display = 'block';
        }
        
        playSnd('correct');
        fireConfetti(); 
    });
</script>
</body>
</html>
